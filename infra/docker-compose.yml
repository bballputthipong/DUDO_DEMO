services:
  postgres:
    image: postgres:16-alpine
    container_name: wellness-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-wellness}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-wellness_password}
      POSTGRES_DB: ${POSTGRES_DB:-wellness_db}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: wellness-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - redis_data:/data

  backend:
    container_name: wellness-backend
    build:
      context: ..
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${PORT:-3001}
      APP_URL: ${APP_URL:-http://localhost:3001}
      DATABASE_URL: ${DATABASE_URL:-postgresql://wellness:wellness_password@postgres:5432/wellness_db}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      JWT_SECRET: ${JWT_SECRET:-replace-with-256-bit-secret}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-replace-with-256-bit-refresh-secret}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-30d}
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY:-}
      STORAGE_BUCKET: ${STORAGE_BUCKET:-wellness-uploads}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      TWILIO_FROM_NUMBER: ${TWILIO_FROM_NUMBER:-}
      ADMIN_INVITE_SECRET: ${ADMIN_INVITE_SECRET:-replace-with-admin-invite-secret}
      SETTLEMENT_CRON_SCHEDULE: ${SETTLEMENT_CRON_SCHEDULE:-0 0 1 * *}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../backend/src:/app/backend/src
      - ../backend/prisma:/app/backend/prisma

volumes:
  postgres_data:
  redis_data:
